name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build app
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      
      - name: Get version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: powershell
      
      - name: Find portable exe
        id: artifact
        run: |
          $exe = Get-ChildItem "release" -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          }
        shell: powershell
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifact.outputs.EXE_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to latest
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifact.outputs.EXE_PATH }}
          tag_name: latest
          prerelease: true
          body: "Latest build from main branch"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
